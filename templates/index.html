<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Board</title>
  <style>
    /* ── CSS Variables (GitHub-light theme) ── */
    :root {
      --bg:          #f6f8fa;
      --surface:     #ffffff;
      --border:      #d0d7de;
      --text:        #1f2328;
      --text-muted:  #57606a;
      --accent:      #0969da;
      --accent-fg:   #ffffff;
      --danger:      #cf222e;
      --radius:      6px;
      --shadow:      0 1px 3px rgba(0,0,0,0.12);

      /* column accent colours */
      --col-backlog: #6e7781;
      --col-running: #6639ba;
      --col-review:  #bf8700;
      --col-done:    #1a7f37;
      --col-failed:  #cf222e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ── */
    #navbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .logo {
      font-weight: 600;
      font-size: 16px;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .logo span { color: var(--accent); }

    #project-switcher {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }
    #project-select {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 5px 8px;
      font-size: 14px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      max-width: 220px;
    }
    button {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 5px 12px;
      font-size: 13px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-weight: 500;
      transition: background 0.1s;
    }
    button:hover { background: var(--bg); }
    button.primary {
      background: var(--accent);
      color: var(--accent-fg);
      border-color: var(--accent);
    }
    button.primary:hover { background: #0860ca; }
    button.danger { color: var(--danger); border-color: var(--danger); }
    button.danger:hover { background: #fff0f0; }

    /* ── Board ── */
    #board {
      display: flex;
      gap: 12px;
      padding: 20px;
      flex: 1;
      overflow-x: auto;
      align-items: flex-start;
    }

    .column {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 240px;
      min-width: 240px;
      display: flex;
      flex-direction: column;
    }

    .col-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      border-top: 3px solid var(--col-backlog);
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .column[data-col="Backlog"] .col-header { border-top-color: var(--col-backlog); }
    .column[data-col="Running"] .col-header { border-top-color: var(--col-running); }
    .column[data-col="Review"]  .col-header { border-top-color: var(--col-review);  }
    .column[data-col="Done"]    .col-header { border-top-color: var(--col-done);    }
    .column[data-col="Failed"]  .col-header { border-top-color: var(--col-failed);  }

    .col-title {
      font-weight: 600;
      font-size: 13px;
      flex: 1;
    }
    .col-count {
      background: var(--border);
      border-radius: 20px;
      padding: 1px 7px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
    }
    .btn-add-card {
      border: none;
      background: none;
      font-size: 18px;
      padding: 0 4px;
      color: var(--text-muted);
      line-height: 1;
    }
    .btn-add-card:hover { color: var(--accent); background: none; }

    /* ── Card List ── */
    .card-list {
      padding: 8px;
      min-height: 60px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .card-list.drag-over {
      background: rgba(9, 105, 218, 0.05);
      border-radius: 4px;
    }
    .drop-indicator {
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin: 2px 0;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      box-shadow: var(--shadow);
      cursor: grab;
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: relative;
      transition: box-shadow 0.1s, transform 0.1s;
    }
    .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.15); transform: translateY(-1px); }
    .card.dragging { opacity: 0.45; cursor: grabbing; }

    .card-title { font-weight: 500; font-size: 13px; line-height: 1.4; word-break: break-word; }
    .card-desc  { font-size: 12px; color: var(--text-muted); white-space: pre-wrap; word-break: break-word; }
    .card-meta  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .card-actions {
      display: none;
      position: absolute;
      top: 6px;
      right: 6px;
      gap: 4px;
    }
    .card:hover .card-actions { display: flex; }
    .card-actions button {
      border: none;
      background: var(--surface);
      padding: 2px 5px;
      font-size: 12px;
      color: var(--text-muted);
      border-radius: 4px;
    }
    .card-actions button:hover { background: var(--bg); color: var(--text); }
    .card-actions .btn-del-card:hover { color: var(--danger); }

    /* ── Modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }

    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      width: 380px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .modal-box h3 { font-size: 16px; font-weight: 600; }
    .modal-box input,
    .modal-box textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 10px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      resize: vertical;
    }
    .modal-box input:focus,
    .modal-box textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
    .modal-box textarea { min-height: 80px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      padding: 16px 8px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }
  </style>
</head>
<body>

<!-- Navbar -->
<header id="navbar">
  <span class="logo">&#9776; <span>Kanban</span></span>
  <div id="project-switcher">
    <select id="project-select" title="Switch project"></select>
    <button id="btn-new-project" class="primary">+ New Project</button>
    <button id="btn-del-project" class="danger">Delete</button>
  </div>
</header>

<!-- Board -->
<main id="board">
  <!-- columns rendered by JS -->
</main>

<!-- Add / Edit Card Modal -->
<div id="modal-overlay">
  <div class="modal-box">
    <h3 id="modal-heading">New Job Package</h3>
    <input id="modal-title" type="text" placeholder="Title (required)" maxlength="200" />
    <textarea id="modal-desc" placeholder="Description (optional)"></textarea>
    <div class="modal-actions">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-submit" class="primary">Add</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// Config
// ============================================================
const COLUMNS = ["Backlog", "Running", "Review", "Done", "Failed"];

const API = {
  projects:     ()             => `/api/projects`,
  projectBoard: (pid)          => `/api/projects/${pid}/board`,
  deleteProj:   (pid)          => `/api/projects/${pid}`,
  active:       ()             => `/api/active`,
  cards:        (pid)          => `/api/projects/${pid}/cards`,
  card:         (pid, cid)     => `/api/projects/${pid}/cards/${cid}`,
  moveCard:     (pid, cid)     => `/api/projects/${pid}/cards/${cid}/move`,
};

// ============================================================
// State
// ============================================================
const State = {
  projects:  [],   // [{id, name, card_counts}]
  activeId:  null,
  board:     null, // full project object
};

// ============================================================
// API Layer
// ============================================================
async function apiFetch(url, method = "GET", body = null) {
  const opts = { method, headers: {} };
  if (body !== null) {
    opts.body = JSON.stringify(body);
    opts.headers["Content-Type"] = "application/json";
  }
  const res = await fetch(url, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

async function fetchProjects() {
  return apiFetch(API.projects());
}
async function fetchBoard(pid) {
  return apiFetch(API.projectBoard(pid));
}
async function createProject(name) {
  return apiFetch(API.projects(), "POST", { name });
}
async function deleteProject(pid) {
  return apiFetch(API.deleteProj(pid), "DELETE");
}
async function setActive(pid) {
  return apiFetch(API.active(), "PUT", { project_id: pid });
}
async function createCard(pid, col, title, desc) {
  return apiFetch(API.cards(pid), "POST", { title, column: col, description: desc });
}
async function deleteCard(pid, cid) {
  return apiFetch(API.card(pid, cid), "DELETE");
}
async function editCard(pid, cid, title, desc) {
  return apiFetch(API.card(pid, cid), "PATCH", { title, description: desc });
}
async function moveCard(pid, cid, column, order) {
  return apiFetch(API.moveCard(pid, cid), "PUT", { column, order });
}

// ============================================================
// Drag-and-Drop State
// ============================================================
let drag = { cardId: null, sourceCol: null };

// ============================================================
// Render Layer
// ============================================================
function renderProjectSelect() {
  const sel = document.getElementById("project-select");
  sel.innerHTML = "";
  State.projects.forEach(p => {
    const opt = document.createElement("option");
    opt.value = p.id;
    opt.textContent = p.name;
    if (p.id === State.activeId) opt.selected = true;
    sel.appendChild(opt);
  });
}

function renderBoard() {
  const board = document.getElementById("board");
  board.innerHTML = "";
  if (!State.board) return;
  COLUMNS.forEach(col => {
    const cards = (State.board.columns[col] || []).slice().sort((a, b) => a.order - b.order);
    board.appendChild(renderColumn(col, cards));
  });
}

function renderColumn(col, cards) {
  const section = document.createElement("section");
  section.className = "column";
  section.dataset.col = col;

  // Header
  const header = document.createElement("div");
  header.className = "col-header";
  header.innerHTML = `
    <span class="col-title">${col}</span>
    <span class="col-count" id="count-${col}">${cards.length}</span>
    <button class="btn-add-card" title="Add job package">+</button>
  `;
  header.querySelector(".btn-add-card").addEventListener("click", () => openAddModal(col));
  section.appendChild(header);

  // Card list
  const list = document.createElement("div");
  list.className = "card-list";
  list.dataset.col = col;

  if (cards.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty-state";
    empty.textContent = "No items";
    list.appendChild(empty);
  } else {
    cards.forEach(card => list.appendChild(renderCard(card, col)));
  }

  attachDropZone(list);
  section.appendChild(list);
  return section;
}

function renderCard(card, col) {
  const el = document.createElement("div");
  el.className = "card";
  el.draggable = true;
  el.dataset.cardId = card.id;
  el.dataset.col = col;

  const dateStr = card.created_at ? card.created_at.slice(0, 10) : "";

  el.innerHTML = `
    <div class="card-actions">
      <button class="btn-edit-card" title="Edit">✎</button>
      <button class="btn-del-card"  title="Delete">✕</button>
    </div>
    <div class="card-title">${escapeHtml(card.title)}</div>
    ${card.description ? `<div class="card-desc">${escapeHtml(card.description)}</div>` : ""}
    <div class="card-meta">${dateStr}</div>
  `;

  el.querySelector(".btn-edit-card").addEventListener("click", (e) => {
    e.stopPropagation();
    openEditModal(card);
  });
  el.querySelector(".btn-del-card").addEventListener("click", async (e) => {
    e.stopPropagation();
    if (!confirm(`Delete "${card.title}"?`)) return;
    try {
      await deleteCard(State.activeId, card.id);
      await reloadBoard();
    } catch (err) { alert(err.message); }
  });

  // Drag events
  el.addEventListener("dragstart", (e) => {
    drag.cardId = card.id;
    drag.sourceCol = col;
    el.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
  });
  el.addEventListener("dragend", () => {
    el.classList.remove("dragging");
    document.querySelectorAll(".drop-indicator").forEach(d => d.remove());
    document.querySelectorAll(".card-list").forEach(l => l.classList.remove("drag-over"));
  });

  return el;
}

function attachDropZone(list) {
  list.addEventListener("dragover", (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    list.classList.add("drag-over");

    // Show insertion indicator
    document.querySelectorAll(".drop-indicator").forEach(d => d.remove());
    const indicator = document.createElement("div");
    indicator.className = "drop-indicator";
    const afterEl = getDragAfterElement(list, e.clientY);
    if (afterEl) {
      list.insertBefore(indicator, afterEl);
    } else {
      list.appendChild(indicator);
    }
  });

  list.addEventListener("dragleave", (e) => {
    if (!list.contains(e.relatedTarget)) {
      list.classList.remove("drag-over");
      document.querySelectorAll(".drop-indicator").forEach(d => d.remove());
    }
  });

  list.addEventListener("drop", async (e) => {
    e.preventDefault();
    list.classList.remove("drag-over");
    document.querySelectorAll(".drop-indicator").forEach(d => d.remove());

    const toCol = list.dataset.col;
    const order = getInsertIndex(list, e.clientY);

    if (!drag.cardId) return;
    try {
      const updatedBoard = await moveCard(State.activeId, drag.cardId, toCol, order);
      State.board = updatedBoard;
      renderBoard();
    } catch (err) { alert(err.message); }
    drag = { cardId: null, sourceCol: null };
  });
}

function getDragAfterElement(container, y) {
  const cards = [...container.querySelectorAll(".card:not(.dragging)")];
  return cards.find(card => {
    const rect = card.getBoundingClientRect();
    return y < rect.top + rect.height / 2;
  });
}

function getInsertIndex(list, clientY) {
  const cards = [...list.querySelectorAll(".card:not(.dragging)")];
  for (let i = 0; i < cards.length; i++) {
    const rect = cards[i].getBoundingClientRect();
    if (clientY < rect.top + rect.height / 2) return i;
  }
  return cards.length;
}

// ============================================================
// Modal
// ============================================================
let modalMode = null;   // "add" | "edit"
let modalCol  = null;
let modalCardId = null;

function openAddModal(col) {
  modalMode   = "add";
  modalCol    = col;
  modalCardId = null;
  document.getElementById("modal-heading").textContent = `New Job Package — ${col}`;
  document.getElementById("modal-title").value = "";
  document.getElementById("modal-desc").value  = "";
  document.getElementById("modal-submit").textContent = "Add";
  document.getElementById("modal-overlay").classList.add("open");
  document.getElementById("modal-title").focus();
}

function openEditModal(card) {
  modalMode   = "edit";
  modalCol    = null;
  modalCardId = card.id;
  document.getElementById("modal-heading").textContent = "Edit Job Package";
  document.getElementById("modal-title").value = card.title;
  document.getElementById("modal-desc").value  = card.description || "";
  document.getElementById("modal-submit").textContent = "Save";
  document.getElementById("modal-overlay").classList.add("open");
  document.getElementById("modal-title").focus();
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  modalMode = modalCol = modalCardId = null;
}

async function submitModal() {
  const title = document.getElementById("modal-title").value.trim();
  const desc  = document.getElementById("modal-desc").value.trim();
  if (!title) { document.getElementById("modal-title").focus(); return; }

  try {
    if (modalMode === "add") {
      await createCard(State.activeId, modalCol, title, desc);
    } else {
      await editCard(State.activeId, modalCardId, title, desc);
    }
    closeModal();
    await reloadBoard();
  } catch (err) { alert(err.message); }
}

// ============================================================
// Project actions
// ============================================================
async function switchProject(pid) {
  await setActive(pid);
  State.activeId = pid;
  await reloadBoard();
}

async function handleNewProject() {
  const name = prompt("New project name:");
  if (!name || !name.trim()) return;
  try {
    const proj = await createProject(name.trim());
    State.activeId = proj.id;
    await reloadAll();
  } catch (err) { alert(err.message); }
}

async function handleDeleteProject() {
  const proj = State.projects.find(p => p.id === State.activeId);
  if (!proj) return;
  if (!confirm(`Delete project "${proj.name}" and all its cards? This cannot be undone.`)) return;
  try {
    const res = await deleteProject(State.activeId);
    State.activeId = res.active_project_id;
    await reloadAll();
  } catch (err) { alert(err.message); }
}

// ============================================================
// Load helpers
// ============================================================
async function reloadAll() {
  const data = await fetchProjects();
  State.projects = data.projects;
  State.activeId = data.active_project_id;
  renderProjectSelect();
  await reloadBoard();
}

async function reloadBoard() {
  State.board = await fetchBoard(State.activeId);
  renderBoard();
}

// ============================================================
// Utility
// ============================================================
function escapeHtml(str) {
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ============================================================
// Init
// ============================================================
document.addEventListener("DOMContentLoaded", async () => {
  // Wire project controls
  document.getElementById("project-select").addEventListener("change", (e) => {
    switchProject(e.target.value);
  });
  document.getElementById("btn-new-project").addEventListener("click", handleNewProject);
  document.getElementById("btn-del-project").addEventListener("click", handleDeleteProject);

  // Wire modal
  document.getElementById("modal-cancel").addEventListener("click", closeModal);
  document.getElementById("modal-submit").addEventListener("click", submitModal);
  document.getElementById("modal-overlay").addEventListener("click", (e) => {
    if (e.target === document.getElementById("modal-overlay")) closeModal();
  });
  document.getElementById("modal-title").addEventListener("keydown", (e) => {
    if (e.key === "Enter") submitModal();
    if (e.key === "Escape") closeModal();
  });

  // Load initial data
  await reloadAll();
});
</script>
</body>
</html>
