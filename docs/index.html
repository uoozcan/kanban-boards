<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Boards</title>
  <style>
    :root {
      --bg:          #f6f8fa;
      --surface:     #ffffff;
      --border:      #d0d7de;
      --text:        #1f2328;
      --text-muted:  #57606a;
      --accent:      #0969da;
      --radius:      6px;
      --shadow:      0 1px 3px rgba(0,0,0,0.12);
      --col-backlog: #6e7781;
      --col-running: #6639ba;
      --col-review:  #bf8700;
      --col-done:    #1a7f37;
      --col-failed:  #cf222e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ── */
    #navbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .logo { font-weight: 600; font-size: 16px; }
    .logo span { color: var(--accent); }

    .badge {
      background: #ddf4ff;
      color: #0550ae;
      border: 1px solid #54aeff66;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 500;
    }

    #project-switcher {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    select {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 5px 8px;
      font-size: 14px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      max-width: 220px;
    }

    #meta {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    button.refresh {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px 10px;
      font-size: 12px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
    }
    button.refresh:hover { background: var(--bg); }

    /* ── Board ── */
    #board {
      display: flex;
      gap: 12px;
      padding: 20px;
      flex: 1;
      overflow-x: auto;
      align-items: flex-start;
    }

    .column {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 240px;
      min-width: 240px;
    }

    .col-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      border-top: 3px solid var(--col-backlog);
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .column[data-col="Backlog"] .col-header { border-top-color: var(--col-backlog); }
    .column[data-col="Running"] .col-header { border-top-color: var(--col-running); }
    .column[data-col="Review"]  .col-header { border-top-color: var(--col-review);  }
    .column[data-col="Done"]    .col-header { border-top-color: var(--col-done);    }
    .column[data-col="Failed"]  .col-header { border-top-color: var(--col-failed);  }

    .col-title { font-weight: 600; font-size: 13px; flex: 1; }
    .col-count {
      background: var(--border);
      border-radius: 20px;
      padding: 1px 7px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .card-list {
      padding: 8px;
      min-height: 40px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .card-title { font-weight: 500; font-size: 13px; line-height: 1.4; word-break: break-word; }
    .card-desc  { font-size: 12px; color: var(--text-muted); white-space: pre-wrap; word-break: break-word; }
    .card-meta  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      padding: 16px 8px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    /* ── Loading / Error ── */
    #status {
      padding: 40px;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
    }
    #status.error { color: #cf222e; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 16px;
      font-size: 12px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header id="navbar">
  <span class="logo">&#9776; <span>Kanban</span></span>
  <span class="badge">View only</span>
  <div id="project-switcher">
    <select id="project-select"></select>
  </div>
  <div id="meta">
    <span id="last-updated"></span>
    <button class="refresh" onclick="loadData()">&#8635; Refresh</button>
  </div>
</header>

<div id="status">Loading boards…</div>
<main id="board" style="display:none"></main>

<footer>
  Read-only view &mdash; data auto-fetched from
  <a href="https://github.com/uoozcan/kanban-boards" target="_blank">github.com/uoozcan/kanban-boards</a>.
  Updates may take ~5 minutes to appear after a push.
</footer>

<script>
const DATA_URL = "https://raw.githubusercontent.com/uoozcan/kanban-boards/main/data.json";
const COLUMNS  = ["Backlog", "Running", "Review", "Done", "Failed"];

let state = { projects: [], activeId: null };

async function loadData() {
  document.getElementById("status").textContent = "Refreshing…";
  document.getElementById("status").className = "";
  document.getElementById("board").style.display = "none";

  try {
    // Cache-bust so GitHub CDN doesn't serve stale data
    const res = await fetch(DATA_URL + "?t=" + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    state.projects = data.projects || [];
    state.activeId = data.active_project_id || (state.projects[0] || {}).id;

    renderSelect();
    renderBoard();

    document.getElementById("last-updated").textContent =
      "Fetched " + new Date().toLocaleTimeString();
    document.getElementById("status").style.display = "none";
    document.getElementById("board").style.display  = "flex";
  } catch (err) {
    document.getElementById("status").textContent =
      "Failed to load data.json: " + err.message;
    document.getElementById("status").className = "error";
  }
}

function renderSelect() {
  const sel = document.getElementById("project-select");
  sel.innerHTML = "";
  state.projects.forEach(p => {
    const opt = document.createElement("option");
    opt.value = p.id;
    opt.textContent = p.name;
    if (p.id === state.activeId) opt.selected = true;
    sel.appendChild(opt);
  });
}

function renderBoard() {
  const board = document.getElementById("board");
  board.innerHTML = "";
  const project = state.projects.find(p => p.id === state.activeId);
  if (!project) return;

  COLUMNS.forEach(col => {
    const cards = (project.columns[col] || []).slice().sort((a, b) => a.order - b.order);
    board.appendChild(renderColumn(col, cards));
  });
}

function renderColumn(col, cards) {
  const section = document.createElement("section");
  section.className = "column";
  section.dataset.col = col;

  const header = document.createElement("div");
  header.className = "col-header";
  header.innerHTML = `
    <span class="col-title">${col}</span>
    <span class="col-count">${cards.length}</span>
  `;
  section.appendChild(header);

  const list = document.createElement("div");
  list.className = "card-list";

  if (cards.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty-state";
    empty.textContent = "No items";
    list.appendChild(empty);
  } else {
    cards.forEach(card => list.appendChild(renderCard(card)));
  }

  section.appendChild(list);
  return section;
}

function renderCard(card) {
  const el = document.createElement("div");
  el.className = "card";
  const dateStr = card.created_at ? card.created_at.slice(0, 10) : "";
  el.innerHTML = `
    <div class="card-title">${escHtml(card.title)}</div>
    ${card.description ? `<div class="card-desc">${escHtml(card.description)}</div>` : ""}
    <div class="card-meta">${dateStr}</div>
  `;
  return el;
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

document.getElementById("project-select").addEventListener("change", e => {
  state.activeId = e.target.value;
  renderBoard();
});

loadData();
// Auto-refresh every 5 minutes
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
